<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Momentum</title>
    <meta name="theme-color" media="(prefers-color-scheme: light)" content="#EEF0ED" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#131714" />
    <!-- Minimal orange tick-circle favicon (12 ticks + center dot). -->
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='12.5' fill='none' stroke='%23E8590C' stroke-width='3' pathLength='60' stroke-dasharray='1 4' stroke-linecap='round'/%3E%3Ccircle cx='16' cy='16' r='4.5' fill='%23E8590C'/%3E%3C/svg%3E"
    />
    <script>
      // Apply the theme before first paint: explicit choice wins, otherwise
      // follow the OS. The header toggle keeps 'momentum.theme' up to date.
      ;(function () {
        try {
          var stored = localStorage.getItem('momentum.theme')
          if (
            stored === 'dark' ||
            (!stored && window.matchMedia('(prefers-color-scheme: dark)').matches)
          ) {
            document.documentElement.classList.add('dark')
          }
        } catch (e) {
          /* storage unavailable - default to light */
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
