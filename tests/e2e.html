<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Momentum e2e (pending)</title>
</head>
<body>
  <h1>Momentum e2e runner</h1>
  <p>This page loads the real app in the iframe below and drives it as "testuser".
     A headless browser reads the JSON result out of the block at the bottom.</p>
  <iframe id="app" src="/" style="width:960px;height:760px;border:1px solid #ccc"></iframe>
  <pre id="__results__">[]</pre>

  <script>
  // ------------------------------------------------------------------
  // Browser end-to-end tests for goal editing, partial-credit scoring,
  // drag-to-reorder, read-only past days + automatic carry-over, and
  // time entry in hours + minutes.
  // Runs the REAL index.html + app.js (in the iframe) so no template drift.
  // Results are written into #__results__ as JSON for the Node runner to parse.
  // ------------------------------------------------------------------
  const results = [];
  const rec = (name, ok, detail) => results.push({ name, ok: !!ok, detail: detail ? String(detail) : '' });
  const sleep = (ms) => new Promise((r) => setTimeout(r, ms));

  let done = false;
  function finish() {
    if (done) return;
    done = true;
    document.getElementById('__results__').textContent = JSON.stringify(results);
    document.getElementById('__results__').setAttribute('data-done', '1');
    document.title = 'Momentum e2e (done)';
  }

  async function waitFor(fn, timeout = 10000, step = 50) {
    const start = Date.now();
    while (Date.now() - start < timeout) {
      try { const v = fn(); if (v) return v; } catch (e) { /* keep polling */ }
      await sleep(step);
    }
    return null;
  }

  async function main() {
    const suite = (new URLSearchParams(location.search).get('suite') || 'feature').toLowerCase();
    const iframe = document.getElementById('app');
    const win = () => iframe.contentWindow;
    const doc = () => iframe.contentDocument;
    const q = (sel) => doc().querySelector(sel);
    const fireInput = (el) => el.dispatchEvent(new (win().Event)('input', { bubbles: true }));

    // 1. Wait for Alpine + the app component to initialise inside the iframe.
    const comp = await waitFor(() => {
      const w = win(), d = doc();
      if (!w || !d) return null;
      const root = d.querySelector('[x-data]');
      if (!w.Alpine || !root) return null;
      const c = w.Alpine.$data(root);
      return (c && typeof c.signup === 'function' && c.today) ? c : null;
    });
    if (!comp) { rec('app + Alpine initialise in iframe', false, 'component never became ready'); return finish(); }
    rec('app + Alpine initialise in iframe', true);

    // 2. Sign up / log in as testuser (fresh isolated env -> signup creates it).
    try { await comp.signup('testuser'); } catch (e) { rec('signup testuser', false, e); return finish(); }
    await sleep(150);
    rec('signup testuser logs in', comp.loggedIn === true);

    // 3. Add a goal with one subtask, confirm it renders.
    comp.newGoal = { topic: 'Edit target', hours: 1, subtasksText: 'first sub' };
    comp.addGoal();
    await sleep(120);
    const goal = comp.goals[comp.today] && comp.goals[comp.today][0];
    rec('goal added and rendered', !!goal && !!q('.goal-card'));

    // 4. Enter edit mode via the pencil button.
    const editBtn = q('button[title="Edit goal"]');
    rec('edit (pencil) button present', !!editBtn);
    if (editBtn) editBtn.click();
    await sleep(120);
    rec('edit mode shows title textarea (x-if)', !!q('textarea[placeholder="Goal title"]'));

    const subTa = q('textarea[placeholder="Subtask"]');
    rec('edit mode shows subtask textarea', !!subTa);

    // 5. autoGrow + x-model on the subtask textarea.
    if (subTa) {
      subTa.value = 'one line';
      fireInput(subTa);
      await sleep(60);
      const h1 = subTa.offsetHeight;
      subTa.value = 'l1\nl2\nl3\nl4\nl5';
      fireInput(subTa);
      await sleep(60);
      const h2 = subTa.offsetHeight;
      rec('autoGrow: textarea grows with line count', h2 > h1, 'h1=' + h1 + ' h2=' + h2);
      rec('x-model updates subtask text', goal.subtasks[0].text === 'l1\nl2\nl3\nl4\nl5');

      // 6. Content with blank lines, to verify cleanup on Done.
      subTa.value = 'keep\n\n\nlines';
      fireInput(subTa);
      await sleep(60);
    }

    // 7. Done -> cleanText strips blank lines, edit fields disappear.
    const doneBtn = q('button[title="Done editing"]');
    rec('done (check) button present', !!doneBtn);
    if (doneBtn) doneBtn.click();
    await sleep(120);
    rec('blank lines stripped on Done', goal.subtasks[0] && goal.subtasks[0].text === 'keep\nlines',
        goal.subtasks[0] && JSON.stringify(goal.subtasks[0].text));
    rec('edit fields removed after Done', !q('textarea[placeholder="Subtask"]'));
    const card = q('.goal-card');
    rec('display shows cleaned multi-line text',
        !!card && card.textContent.includes('keep') && card.textContent.includes('lines'));

    // 8. Empty a subtask -> it is dropped on Done.
    const editBtn2 = q('button[title="Edit goal"]');
    if (editBtn2) editBtn2.click();
    await sleep(100);
    const subTa2 = q('textarea[placeholder="Subtask"]');
    if (subTa2) { subTa2.value = ''; fireInput(subTa2); await sleep(60); }
    const doneBtn2 = q('button[title="Done editing"]');
    if (doneBtn2) doneBtn2.click();
    await sleep(120);
    rec('emptied subtask removed on Done', goal.subtasks.length === 0, 'len=' + goal.subtasks.length);

    // 9. Partial-credit scoring: a half-finished goal fills the ring to 50%.
    comp.goals[comp.today] = [];                        // start the day clean
    comp.newGoal = { topic: 'Half done', hours: 2, subtasksText: 'a\nb' };
    comp.addGoal();
    await sleep(120);
    const pg = comp.goals[comp.today][0];
    rec('partial: fresh 2-subtask goal starts at 0%', comp.dayStats().pct === 0, 'pct=' + comp.dayStats().pct);
    const subChk = q('input[type="checkbox"]');
    rec('partial: subtask checkbox present', !!subChk);
    if (subChk) subChk.click();                         // complete 1 of 2 subtasks via the UI
    await waitFor(() => comp.dayStats().pct === 50, 3000);
    rec('partial: one of two subtasks fills the ring to 50%', comp.dayStats().pct === 50, 'pct=' + comp.dayStats().pct);
    const ringShows = await waitFor(() =>
      Array.from(doc().querySelectorAll('*')).some(el => el.children.length === 0 && el.textContent.trim() === '50%'), 3000);
    rec('partial: ring text displays 50%', !!ringShows);
    rec('partial: goal not marked complete at 50%', pg.completed === false);

    // 10. Full suite: a couple of broader UI smoke checks.
    if (suite === 'full') {
      const chk = q('.goal-card button.chk-btn');
      if (chk) chk.click();
      await sleep(100);
      rec('full: clicking the checkbox completes the goal', pg.completed === true);

      comp.activeTab = 'backlog';
      await sleep(80);
      rec('full: tab navigation switches to backlog', comp.activeTab === 'backlog');
    }

    // 11. SHIPPED: add-goal form on top + drag-to-reorder.
    comp.activeTab = 'today';
    comp.goals[comp.today] = [];
    await sleep(60);
    comp.newGoal = { topic: 'First',  hours: 1, subtasksText: '' }; comp.addGoal();
    comp.newGoal = { topic: 'Second', hours: 1, subtasksText: '' }; comp.addGoal();
    comp.newGoal = { topic: 'Third',  hours: 1, subtasksText: '' }; comp.addGoal();
    await sleep(150);

    // Add-goal form renders ABOVE the goals list.
    const addBtn = Array.from(doc().querySelectorAll('button')).find(b => /add a goal/i.test(b.textContent));
    const firstCard = q('.goal-card');
    rec('reorder: add-goal form present', !!addBtn);
    rec('reorder: add-goal form sits above the goals list',
        !!addBtn && !!firstCard && (addBtn.compareDocumentPosition(firstCard) & 4) !== 0);

    // Drag affordances render and cards are draggable.
    rec('reorder: goal drag handle present', !!q('.goal-card .drag-handle'));
    rec('reorder: goal card is draggable', !!firstCard && firstCard.getAttribute('draggable') === 'true');

    // moveGoal drives the REAL component + re-render (drag events themselves aren't
    // reliably synthesizable headless, so we exercise the same code path the drop fires).
    comp.moveGoal(0, 2);
    await sleep(120);
    const renderedTopics = () => Array.from(doc().querySelectorAll('.goal-card .topic-text')).map(el => el.textContent.trim());
    rec('reorder: moveGoal updates state order',
        JSON.stringify(comp.goals[comp.today].map(g => g.topic)) === JSON.stringify(['Second', 'Third', 'First']));
    rec('reorder: DOM reflects the new goal order',
        JSON.stringify(renderedTopics()) === JSON.stringify(['Second', 'Third', 'First']), 'rendered=' + JSON.stringify(renderedTopics()));

    // Subtask reorder within a goal.
    comp.goals[comp.today] = [];
    comp.newGoal = { topic: 'HasSubs', hours: 1, subtasksText: 'one\ntwo\nthree' }; comp.addGoal();
    await sleep(150);
    const gsub = comp.goals[comp.today][0];
    rec('reorder: subtask drag handle present', !!q('.subtask-row .drag-handle'));
    comp.moveSubtask(gsub, 0, 2);
    await sleep(120);
    rec('reorder: moveSubtask reorders within a goal',
        JSON.stringify(gsub.subtasks.map(s => s.text)) === JSON.stringify(['two', 'three', 'one']));

    // 12. CURRENT FEATURE: read-only past days + automatic carry-over.
    comp.activeTab = 'today';

    // Habit instances are never auto-carried, but CAN be moved to the backlog by hand.
    comp.goals[comp.today] = [{ id: 'hab1', topic: 'HabitInst', hours: 1, loggedHours: null,
      completed: false, subtasks: [], createdAt: comp.today, addingSubtask: false, recurringId: 'rX' }];
    await sleep(120);
    const habitCard = q('.goal-card');
    const backlogBtn = habitCard && habitCard.querySelector('button[title^="Move to backlog"]');
    rec('habit: move-to-backlog button is available on a habit instance', !!backlogBtn);
    if (backlogBtn) backlogBtn.click();
    await sleep(100);
    rec('habit: manual move detaches the template (drops recurringId)',
        comp.backlog.some(b => b.topic === 'HabitInst' && !('recurringId' in b)));
    rec('habit: instance removed from today after manual move', (comp.goals[comp.today] || []).length === 0);

    const past = '2020-01-01';   // safely before today
    comp.goals[past] = [
      { id: 'past-done', topic: 'Past done', hours: 1, loggedHours: null, completed: true, subtasks: [], createdAt: past, addingSubtask: false },
      { id: 'past-miss', topic: 'Past miss', hours: 1, loggedHours: null, completed: false, subtasks: [
        { id: 'ps1', text: 'left A', completed: false },
        { id: 'ps2', text: 'done B', completed: true },
      ], createdAt: past, addingSubtask: false },
    ];
    const backlogBefore = comp.backlog.length;
    comp.carriedThrough = '';   // simulate legacy data (no watermark) so this past day is swept
    comp.autoCarryPastDays();
    await sleep(80);
    rec('carry: past day retains both goals (score not emptied)', (comp.goals[past] || []).length === 2);
    // partial credit: completed goal (1.0) + half-done goal (0.5) -> avg 75%, unchanged by the carry
    rec('carry: past day score stays honest at 75%', comp.dayProgressPct(comp.goals[past]) === 75, 'pct=' + comp.dayProgressPct(comp.goals[past]));
    rec('carry: the one unfinished goal is copied to backlog', comp.backlog.length === backlogBefore + 1);
    const copy = comp.backlog[0];
    rec('carry: backlog copy holds only the incomplete subtask', !!copy && copy.subtasks.length === 1 && copy.subtasks[0].text === 'left A');
    rec('carry: source goal is flagged carried', comp.goals[past].some(g => g.id === 'past-miss' && g.carried === true));
    rec('carry: watermark (carriedThrough) advanced past the swept day', !!comp.carriedThrough && comp.carriedThrough >= past);

    // Backlog tab shows the auto-carried-through marker.
    comp.activeTab = 'backlog';
    await sleep(120);
    rec('carry: backlog shows the auto-carried-through marker',
        Array.from(doc().querySelectorAll('*')).some(el => el.children.length === 0 && /auto-carried through/i.test(el.textContent)));
    comp.activeTab = 'today';
    await sleep(80);

    // Navigate to the past day and confirm the UI is read-only.
    comp.selectedDate = past;
    await sleep(150);
    rec('readonly: read-only notice shown on a past day',
        Array.from(doc().querySelectorAll('*')).some(el => el.children.length === 0 && /read-only record/i.test(el.textContent)));
    // x-show only sets display:none, so assert the controls are not *visible* (offsetParent === null), not absent from the DOM.
    const addToggle = Array.from(doc().querySelectorAll('button')).find(b => /add a goal/i.test(b.textContent));
    rec('readonly: add-goal form hidden on a past day', !addToggle || addToggle.offsetParent === null);
    const editBtnPast = q('button[title="Edit goal"]'), delBtnPast = q('button[title="Delete"]');
    rec('readonly: goal action buttons (edit/delete) hidden',
        (!editBtnPast || editBtnPast.offsetParent === null) && (!delBtnPast || delBtnPast.offsetParent === null));
    const pastChk = q('.goal-card button.chk-btn');
    rec('readonly: goal checkbox is disabled', !!pastChk && pastChk.disabled === true);
    rec('readonly: carried badge visible on the carried goal',
        Array.from(doc().querySelectorAll('.goal-card')).some(c => /carried/i.test(c.textContent)));

    // The first card is the completed goal; clicking its (disabled) checkbox must not un-complete it.
    const pastDone = comp.goals[past].find(g => g.id === 'past-done');
    if (pastChk) pastChk.click();
    await sleep(80);
    rec('readonly: clicking a past goal checkbox changes nothing', pastDone.completed === true);

    comp.selectedDate = comp.today;   // restore for any later work
    await sleep(60);

    // 13. CURRENT FEATURE: live midnight rollover while the app keeps running.
    comp.activeTab = 'today';
    comp.goals[comp.today] = [{ id: 'rollmiss', topic: 'Rollover miss', hours: 1, loggedHours: null,
      completed: false, subtasks: [], createdAt: comp.today, addingSubtask: false }];
    await sleep(80);
    const beforeToday = comp.today;
    const tm = new Date(beforeToday + 'T00:00:00'); tm.setDate(tm.getDate() + 1);
    const tomorrow = comp.dateStr(tm);
    const blBefore = comp.backlog.length;
    comp.checkDayRollover(tomorrow);   // simulate the clock passing midnight
    await sleep(150);
    rec('rollover: today advances to the new date', comp.today === tomorrow);
    rec('rollover: yesterday\'s pending goal was carried', comp.backlog.length === blBefore + 1 && comp.backlog.some(b => b.topic === 'Rollover miss'));
    rec('rollover: the previous day is now read-only', comp.isReadonly(beforeToday) === true);
    rec('rollover: the fresh day renders as editable (add-goal form visible)',
        Array.from(doc().querySelectorAll('button')).some(b => /add a goal/i.test(b.textContent) && b.offsetParent !== null));

    // 14. CURRENT FEATURE: inline "add subtask" row - opens on +, commits on Enter, and
    // collapses on Escape / when focus leaves. (The focusout-collapse logic itself is
    // unit-tested in app.test.js; here we drive the deterministic state + key paths,
    // since element focus/layout timing is unreliable under headless.)
    comp.selectedDate = comp.today;
    comp.goals[comp.today] = [];
    comp.newGoal = { topic: 'SubFocus', hours: 1, subtasksText: '' };
    comp.addGoal();
    await sleep(120);
    const sfCard = q('.goal-card');
    const plusBtn = sfCard && sfCard.querySelector('button[title="Add subtask"]');
    rec('subtask-row: add-subtask (+) button present', !!plusBtn);
    if (plusBtn) plusBtn.click();
    await sleep(120);
    const g14 = comp.goals[comp.today][0];
    rec('subtask-row: opens on + (addingSubtask true)', g14.addingSubtask === true);
    const subInput = q('input[placeholder="New subtask..."]');
    rec('subtask-row: input rendered', !!subInput);
    if (subInput) {
      subInput.value = 'a subtask'; fireInput(subInput);
      subInput.dispatchEvent(new (win().KeyboardEvent)('keydown', { key: 'Enter', bubbles: true }));
      await sleep(120);
    }
    rec('subtask-row: Enter commits the subtask', g14.subtasks.length === 1 && g14.subtasks[0].text === 'a subtask');
    rec('subtask-row: stays open after Enter for rapid entry', g14.addingSubtask === true);
    // Escape collapses the row and discards any uncommitted draft.
    const subInput2 = q('input[placeholder="New subtask..."]');
    if (subInput2) {
      subInput2.value = 'half typed'; fireInput(subInput2);
      subInput2.dispatchEvent(new (win().KeyboardEvent)('keydown', { key: 'Escape', bubbles: true }));
      await sleep(80);
    }
    rec('subtask-row: Escape collapses the row', g14.addingSubtask === false);
    rec('subtask-row: Escape clears the draft', !(g14.id in comp.subtaskDrafts));

    // 15. CURRENT FEATURE: time entry in hours + minutes (planned + logged).
    comp.selectedDate = comp.today;
    comp.goals[comp.today] = [];
    await sleep(80);
    const hasText = (re) => Array.from(doc().querySelectorAll('*')).some(el => el.children.length === 0 && re.test(el.textContent));
    const fireChange = (el) => el.dispatchEvent(new (win().Event)('change', { bubbles: true }));

    // Open the add-goal form and enter 1h 30m via the two number fields.
    const addToggle15 = Array.from(doc().querySelectorAll('button')).find(b => /add a goal/i.test(b.textContent));
    if (addToggle15) addToggle15.click();
    await sleep(100);
    const topicIn = q('input[placeholder="What do you want to work on?"]');
    const numIns = Array.from(doc().querySelectorAll('input[type="number"]'));   // Today form fields come first in the DOM
    rec('time: add-goal has hours + minutes fields', numIns.length >= 2);
    if (topicIn) { topicIn.value = 'Timed goal'; fireInput(topicIn); }
    if (numIns[0]) { numIns[0].value = '1'; fireInput(numIns[0]); }
    if (numIns[1]) { numIns[1].value = '30'; fireInput(numIns[1]); }
    await sleep(60);
    const addGoalBtn = Array.from(doc().querySelectorAll('button')).find(b => b.textContent.trim() === 'Add Goal');
    if (addGoalBtn) addGoalBtn.click();
    await sleep(140);
    const tg = comp.goals[comp.today][0];
    rec('time: 1h 30m entry stored as 1.5 decimal hours', !!tg && tg.hours === 1.5, 'hours=' + (tg && tg.hours));
    rec('time: planned pill renders "1h 30m"', hasText(/1h 30m/));

    // Complete it, then log actual time as 0h 45m via the two logged fields.
    const chk15 = q('.goal-card button.chk-btn');
    if (chk15) chk15.click();
    await sleep(140);
    const card15 = q('.goal-card');
    const logIns = card15 ? Array.from(card15.querySelectorAll('input[type="number"]')) : [];
    rec('time: completed goal shows logged h + m fields', logIns.length === 2);
    if (logIns[0]) { logIns[0].value = '0'; fireChange(logIns[0]); }
    await sleep(60);
    if (logIns[1]) { logIns[1].value = '45'; fireChange(logIns[1]); }
    await sleep(120);
    rec('time: logging 0h 45m stores 0.75 decimal hours', tg.loggedHours === 0.75, 'logged=' + tg.loggedHours);
    rec('time: a "45m" duration label is rendered', hasText(/^45m$/));

    finish();
  }

  // Safety net: never leave the runner hanging without a result.
  setTimeout(() => { if (!done) { rec('overall completion', false, 'timed out'); finish(); } }, 40000);
  main().catch((e) => { rec('runner exception', false, (e && e.stack) || e); finish(); });
  </script>
</body>
</html>
